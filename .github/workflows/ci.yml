name: CI Pipeline

on:
  pull_request:
    branches: ["test", "main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/travery
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # JOB 1: AUTO-FORMAT (Apply & Commit)
  # ============================================================================
  format-apply:
    name: Auto-Format & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push the commit back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Ensures we check out the actual branch, not a detached HEAD
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Apply code formatting
        run: ./mvnw spotless:apply -q

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Only commit if there are actual changes to avoid build errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "refactor code"
            git push
          else
            echo "No formatting changes detected. Skipping commit."
          fi

  # ============================================================================
  # JOB 2: BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Run Tests
    needs: format-apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Ensure we get the latest commit pushed by the format job
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build and Test
        run: ./mvnw clean verify -DfailIfNoTests=false

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  build-and-push:
    name: Build and Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Format image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
